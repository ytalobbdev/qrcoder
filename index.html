<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRcoder do Ytalo</title>
    
    <!-- Tailwind CSS (Estilização) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Bibliotecas para Gerar QR Code e PDF -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- FontAwesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Estilos customizados e Animações Futuristas */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #050914;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.08) 0%, transparent 50%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, .futuristic-font {
            font-family: 'Orbitron', sans-serif;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(6, 182, 212, 0.05);
        }

        .glow-input:focus {
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
            border-color: #06b6d4;
            outline: none;
        }

        .btn-futuristic {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            z-index: 1;
        }

        .btn-futuristic::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.4s ease;
            z-index: -1;
        }

        .btn-futuristic:hover::before {
            left: 100%;
        }

        .btn-futuristic:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px currentColor;
        }

        /* Estilização do input color para combinar com o design */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 48px;
            border-radius: 0.5rem;
            cursor: pointer;
            padding: 0;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 0.5rem;
        }

        /* Container do Anúncio */
        .ad-container-wrapper {
            transition: opacity 0.5s ease, transform 0.5s ease;
            animation: pulse-border 3s infinite alternate;
        }

        @keyframes pulse-border {
            0% { border-color: rgba(6, 182, 212, 0.3); box-shadow: 0 0 10px rgba(6, 182, 212, 0.1); }
            100% { border-color: rgba(168, 85, 247, 0.6); box-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
        }
        
        #qr-preview-container {
            background-image: linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                              linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                              linear-gradient(-45deg, transparent 75%, #1e293b 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 lg:p-8">

    <!-- Header -->
    <header class="text-center mb-10 mt-4">
        <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 mb-2 tracking-wider filter drop-shadow-[0_0_10px_rgba(6,182,212,0.5)]">
            QRcoder do Ytalo
        </h1>
        <p class="text-cyan-200/70 tracking-widest uppercase text-sm md:text-base font-semibold">
            Gerador de Códigos de Alta Tecnologia
        </p>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12 relative z-10">
        
        <!-- Controles / Inputs -->
        <section class="glass-panel rounded-2xl p-6 lg:p-8 flex flex-col gap-6 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-cyan-500/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
            
            <h2 class="text-2xl futuristic-font text-white border-b border-cyan-500/30 pb-2 mb-2">
                <i class="fa-solid fa-microchip text-cyan-400 mr-2"></i> Dados & Personalização
            </h2>

            <div>
                <label for="qr-text" class="block text-sm font-semibold text-cyan-300 mb-2 uppercase tracking-wide">Conteúdo (URL ou Texto)</label>
                <textarea id="qr-text" rows="3" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 glow-input transition-all resize-none" placeholder="https://ytalo.com..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-cyan-300 mb-2 uppercase tracking-wide">Cor do QR Code</label>
                    <input type="color" id="qr-color-fg" value="#06b6d4" class="glow-input">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-cyan-300 mb-2 uppercase tracking-wide">Cor de Fundo</label>
                    <input type="color" id="qr-color-bg" value="#ffffff" class="glow-input">
                </div>
            </div>

            <div class="mt-4 p-4 bg-blue-900/20 border border-blue-500/20 rounded-xl text-sm text-blue-200/80">
                <i class="fa-solid fa-circle-info mr-2"></i>
                <strong>Dica:</strong> A exportação em PNG ignora a "Cor de Fundo" para garantir o fundo 100% transparente. JPG e SVG usarão a cor escolhida.
            </div>
        </section>

        <!-- Preview & Downloads -->
        <section class="glass-panel rounded-2xl p-6 lg:p-8 flex flex-col items-center justify-center relative">
            <div class="absolute bottom-0 left-0 w-32 h-32 bg-purple-500/10 rounded-full blur-3xl -ml-10 -mb-10"></div>

            <h2 class="text-2xl futuristic-font text-white border-b border-purple-500/30 w-full text-center pb-2 mb-6">
                <i class="fa-solid fa-qrcode text-purple-400 mr-2"></i> Pré-visualização
            </h2>

            <!-- Canvas Container -->
            <div id="qr-preview-container" class="p-6 rounded-xl border-2 border-dashed border-slate-600 shadow-[0_0_20px_rgba(0,0,0,0.5)] mb-8 transition-all">
                <canvas id="qr-canvas" class="rounded shadow-lg bg-white"></canvas>
            </div>

            <!-- Botões de Download -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full">
                <button onclick="downloadQR('png')" class="btn-futuristic bg-transparent border border-cyan-400 text-cyan-400 hover:bg-cyan-400 hover:text-black font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 group">
                    <i class="fa-regular fa-image group-hover:scale-110 transition-transform"></i>
                    <span>Baixar PNG <br><small class="text-[10px] font-normal opacity-80">(Fundo Transparente)</small></span>
                </button>
                
                <button onclick="downloadQR('jpg')" class="btn-futuristic bg-transparent border border-purple-400 text-purple-400 hover:bg-purple-400 hover:text-black font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 group">
                    <i class="fa-solid fa-image group-hover:scale-110 transition-transform"></i>
                    <span>Baixar JPG <br><small class="text-[10px] font-normal opacity-80">(Fundo Personalizado)</small></span>
                </button>
                
                <button onclick="downloadQR('svg')" class="btn-futuristic bg-transparent border border-pink-400 text-pink-400 hover:bg-pink-400 hover:text-black font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 group">
                    <i class="fa-solid fa-vector-square group-hover:scale-110 transition-transform"></i>
                    <span>Baixar SVG <br><small class="text-[10px] font-normal opacity-80">(Vetor/Personalizado)</small></span>
                </button>
                
                <button onclick="downloadQR('pdf')" class="btn-futuristic bg-transparent border border-rose-500 text-rose-500 hover:bg-rose-500 hover:text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 group">
                    <i class="fa-solid fa-file-pdf group-hover:scale-110 transition-transform"></i>
                    <span>Baixar PDF <br><small class="text-[10px] font-normal opacity-80">(Documento)</small></span>
                </button>
            </div>
        </section>

    </main>

    <!-- Espaço Publicitário (Posicionado com responsividade) -->
    <!-- Desktop: Fixo no canto inferior direito. Mobile: Relativo no final do conteúdo -->
    <aside id="ad-wrapper" class="ad-container-wrapper relative mt-12 w-full flex flex-col items-center justify-center p-3 rounded-xl bg-slate-900/80 backdrop-blur-md border-2 z-50
                                lg:fixed lg:bottom-6 lg:right-6 lg:w-auto lg:mt-0 lg:shadow-2xl">
        
        <!-- Label Estética do Anúncio -->
        <div class="flex items-center gap-2 mb-2 opacity-60">
            <i class="fa-solid fa-satellite-dish text-[10px] text-cyan-400 animate-pulse"></i>
            <span class="text-[10px] text-cyan-400 uppercase tracking-widest font-bold">Sinal Patrocinado</span>
        </div>

        <!-- O Container exato onde o script injeta o anúncio -->
        <div id="container-ae6aa2a13aff747c67b357b6561d5ede" class="min-w-[320px] min-h-[50px] bg-black/40 rounded flex items-center justify-center text-slate-700 text-xs">
            Aguardando sinal...
        </div>
    </aside>

    <script>
        // --- 1. LÓGICA DO QR CODE ---
        
        const qrInput = document.getElementById('qr-text');
        const colorFg = document.getElementById('qr-color-fg');
        const colorBg = document.getElementById('qr-color-bg');
        const canvas = document.getElementById('qr-canvas');

        // Renderiza a pré-visualização ao vivo
        function renderPreview() {
            const text = qrInput.value || "https://ytalo.com"; // Texto padrão
            const fg = colorFg.value;
            const bg = colorBg.value;

            QRCode.toCanvas(canvas, text, {
                width: 280,
                margin: 2,
                color: {
                    dark: fg,
                    light: bg
                }
            }, function (error) {
                if (error) console.error(error);
            });
        }

        // Atualiza quando o usuário digitar ou mudar cores
        qrInput.addEventListener('input', renderPreview);
        colorFg.addEventListener('input', renderPreview);
        colorBg.addEventListener('input', renderPreview);

        // Inicializa o Canvas
        renderPreview();

        // Lógica de Downloads
        function downloadQR(type) {
            const text = qrInput.value || "https://ytalo.com";
            const fg = colorFg.value;
            const bg = colorBg.value;

            if (type === 'png') {
                // PNG Transparente (light color: #00000000 = transparente)
                QRCode.toDataURL(text, { type: 'image/png', width: 1024, margin: 2, color: { dark: fg, light: '#00000000' } }, function (err, url) {
                    if (err) return console.error(err);
                    triggerDownload(url, 'qrcoder_ytalo.png');
                });
            } 
            else if (type === 'jpg') {
                // JPG com fundo personalizado. Como JPEG nativo não tem transparência, renderizamos em um canvas branco/cor e extraímos.
                QRCode.toDataURL(text, { type: 'image/jpeg', width: 1024, margin: 2, color: { dark: fg, light: bg } }, function (err, url) {
                    if (err) return console.error(err);
                    triggerDownload(url, 'qrcoder_ytalo.jpg');
                });
            }
            else if (type === 'svg') {
                // SVG Vetorizavel com cores
                QRCode.toString(text, { type: 'svg', width: 1024, margin: 2, color: { dark: fg, light: bg } }, function (err, string) {
                    if (err) return console.error(err);
                    const blob = new Blob([string], { type: 'image/svg+xml;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    triggerDownload(url, 'qrcoder_ytalo.svg');
                });
            }
            else if (type === 'pdf') {
                // PDF Documento (Gera PNG alta qualiade e insere no jsPDF)
                QRCode.toDataURL(text, { type: 'image/png', width: 1024, margin: 2, color: { dark: fg, light: bg } }, function (err, url) {
                    if (err) return console.error(err);
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF({
                        orientation: 'portrait',
                        unit: 'mm',
                        format: 'a4'
                    });
                    
                    doc.setFontSize(22);
                    doc.text("QRcoder do Ytalo", 105, 20, { align: "center" });
                    doc.setFontSize(12);
                    doc.text(text.substring(0, 50) + (text.length > 50 ? '...' : ''), 105, 30, { align: "center" });
                    
                    // Adiciona imagem (Centralizada)
                    doc.addImage(url, 'PNG', 45, 40, 120, 120);
                    
                    doc.save('qrcoder_ytalo.pdf');
                });
            }
        }

        function triggerDownload(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }


        // --- 2. LÓGICA DO ESPAÇO PUBLICITÁRIO (Anti-AdBlock & Refresh) ---
        
        function loadAd() {
            const adWrapper = document.getElementById('ad-wrapper');
            const adContainer = document.getElementById('container-ae6aa2a13aff747c67b357b6561d5ede');
            
            // 1. Limpa o container para a nova impressão
            adContainer.innerHTML = '';
            
            // 2. Remove o script antigo se existir
            const oldScript = document.getElementById('dynamic-ad-script');
            if (oldScript) {
                oldScript.remove();
            }

            // Garante que o wrapper esteja visível para tentar carregar
            adWrapper.style.display = 'flex';

            // 3. Cria e insere o novo script do anúncio
            const script = document.createElement('script');
            script.id = 'dynamic-ad-script';
            script.async = true;
            script.dataset.cfasync = 'false';
            script.src = 'https://pl29129303.profitablecpmratenetwork.com/ae6aa2a13aff747c67b357b6561d5ede/invoke.js';

            // Se o bloqueador de anúncio impedir a rede no nível do DOM:
            script.onerror = function() {
                // Esconde todo o design estético do anúncio
                adWrapper.style.display = 'none';
            };

            document.body.appendChild(script);

            // Verificação secundária: alguns adblockers bloqueiam silenciosamente.
            // Checamos após 2.5 segundos se o container injetou algo (iframes, divs, etc).
            setTimeout(() => {
                // Se a div ainda estiver vazia ou contiver apenas nosso texto placeholder invisível
                if (adContainer.innerHTML.trim() === '' || adContainer.innerHTML.includes('Aguardando sinal...')) {
                    adWrapper.style.display = 'none'; // Some com tudo silenciosamente
                }
            }, 2500);
        }

        // Carrega o anúncio na primeira vez que a página abre
        loadAd();

        // Configura o Refresh Automático a cada 4 Minutos (240.000 milissegundos)
        setInterval(loadAd, 240000);

    </script>
</body>
</html>
