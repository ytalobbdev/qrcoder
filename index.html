<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRcoder do Ytalo</title>
    
    <!-- Tailwind CSS (Estilização) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Bibliotecas OFICIAIS e estáveis para QR Code e PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- FontAwesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Estilos customizados e Animações Futuristas */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #050914;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.08) 0%, transparent 50%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
            transition: padding 0.3s ease;
        }

        h1, .futuristic-font {
            font-family: 'Orbitron', sans-serif;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(6, 182, 212, 0.05);
        }

        .glow-input:focus {
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
            border-color: #06b6d4;
            outline: none;
        }

        .btn-futuristic {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            z-index: 1;
        }

        .btn-futuristic::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.4s ease;
            z-index: -1;
        }

        .btn-futuristic:hover::before {
            left: 100%;
        }

        .btn-futuristic:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px currentColor;
        }

        /* Input color customizado */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 48px;
            border-radius: 0.5rem;
            cursor: pointer;
            padding: 0;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 0.5rem;
        }
        
        /* Fundo do Preview */
        #qr-preview-container {
            background-image: linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                              linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                              linear-gradient(-45deg, transparent 75%, #1e293b 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 lg:p-8 min-h-screen" id="main-body">

    <!-- Header -->
    <header class="text-center mb-10 mt-4">
        <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 mb-2 tracking-wider filter drop-shadow-[0_0_10px_rgba(6,182,212,0.5)]">
            QRcoder do Ytalo
        </h1>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12 relative z-10">
        
        <!-- Controles / Inputs -->
        <section class="glass-panel rounded-2xl p-6 lg:p-8 flex flex-col gap-6 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-cyan-500/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
            
            <h2 class="text-2xl futuristic-font text-white border-b border-cyan-500/30 pb-2 mb-2">
                <i class="fa-solid fa-microchip text-cyan-400 mr-2"></i> Dados & Personalização
            </h2>

            <!-- Tabs de Seleção de Modo -->
            <div class="flex gap-2 mb-2 bg-slate-800/50 p-1 rounded-xl">
                <button id="tab-text" class="flex-1 py-2 rounded-lg bg-cyan-500/20 text-cyan-300 font-bold text-sm transition-all focus:outline-none">
                    <i class="fa-solid fa-link mr-1"></i> Link / Texto
                </button>
                <button id="tab-wifi" class="flex-1 py-2 rounded-lg text-slate-400 hover:text-cyan-300 font-bold text-sm transition-all focus:outline-none">
                    <i class="fa-solid fa-wifi mr-1"></i> Rede Wi-Fi
                </button>
            </div>

            <!-- Formulário Texto / Link / WhatsApp -->
            <div id="mode-text-container" class="flex flex-col gap-6 transition-all">
                <div>
                    <label for="qr-text" class="block text-sm font-semibold text-cyan-300 mb-2 uppercase tracking-wide">Conteúdo ou Número (WhatsApp)</label>
                    <textarea id="qr-text" rows="3" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 glow-input transition-all resize-none" placeholder="https://ytalo.com ou 11999999999"></textarea>
                </div>

                <!-- Campo Exclusivo para WhatsApp (Aparece Mágicamente) -->
                <div id="wa-message-container" class="hidden mt-2 pt-5 border-t border-slate-700/50 relative transition-all">
                    <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-[#050914] px-3 py-1 rounded-full text-[10px] text-green-400 font-bold tracking-widest uppercase flex items-center gap-2 border border-green-500/30 shadow-[0_0_10px_rgba(74,222,128,0.2)]">
                        <i class="fa-brands fa-whatsapp text-sm"></i> Modo WhatsApp
                    </div>
                    <label for="wa-message" class="block text-sm font-semibold text-green-300 mb-2 uppercase tracking-wide">Mensagem Automática</label>
                    <textarea id="wa-message" rows="2" class="w-full bg-slate-900/80 border border-green-500/30 rounded-xl p-4 text-white placeholder-slate-500 glow-input transition-all resize-none focus:border-green-400 focus:shadow-[0_0_15px_rgba(74,222,128,0.3)]" placeholder="Ex: Olá, vim pelo seu QR Code..."></textarea>
                </div>
            </div>

            <!-- Formulário Wi-Fi (Oculto por Padrão) -->
            <div id="mode-wifi-container" class="hidden flex flex-col gap-4 transition-all">
                <div>
                    <label for="wifi-ssid" class="block text-sm font-semibold text-cyan-300 mb-2 uppercase tracking-wide">Nome da Rede (SSID) *</label>
                    <input type="text" id="wifi-ssid" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 glow-input transition-all" placeholder="Nome do seu Wi-Fi">
                </div>
                <div>
                    <label for="wifi-password" class="block text-sm font-semibold text-cyan-300 mb-2 uppercase tracking-wide">Senha *</label>
                    <input type="text" id="wifi-password" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 glow-input transition-all" placeholder="Senha da rede">
                </div>
                <div class="relative">
                    <label for="wifi-security" class="block text-sm font-semibold text-cyan-300 mb-2 uppercase tracking-wide">Tipo de Segurança *</label>
                    <select id="wifi-security" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl p-4 text-white glow-input transition-all appearance-none cursor-pointer">
                        <option value="WPA" selected>WPA/WPA2 (Padrão)</option>
                        <option value="WEP">WEP</option>
                        <option value="nopass">Nenhuma (Sem Senha)</option>
                    </select>
                    <!-- Ícone customizado pro select -->
                    <div class="pointer-events-none absolute right-4 bottom-4 flex items-center text-cyan-400">
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-2">
                <div>
                    <label class="block text-sm font-semibold text-cyan-300 mb-2 uppercase tracking-wide">Cor do QR Code</label>
                    <input type="color" id="qr-color-fg" value="#06b6d4" class="glow-input">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-cyan-300 mb-2 uppercase tracking-wide">Cor de Fundo</label>
                    <input type="color" id="qr-color-bg" value="#ffffff" class="glow-input">
                </div>
            </div>
        </section>

        <!-- Preview & Downloads -->
        <section class="glass-panel rounded-2xl p-6 lg:p-8 flex flex-col items-center justify-center relative">
            <div class="absolute bottom-0 left-0 w-32 h-32 bg-purple-500/10 rounded-full blur-3xl -ml-10 -mb-10"></div>

            <h2 class="text-2xl futuristic-font text-white border-b border-purple-500/30 w-full text-center pb-2 mb-6">
                <i class="fa-solid fa-qrcode text-purple-400 mr-2"></i> Pré-visualização
            </h2>

            <!-- Canvas Container -->
            <div id="qr-preview-container" class="p-6 rounded-xl border-2 border-dashed border-slate-600 shadow-[0_0_20px_rgba(0,0,0,0.5)] mb-8 transition-all">
                <canvas id="qr-canvas" class="rounded shadow-lg bg-white"></canvas>
            </div>

            <!-- Botões de Download -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full">
                <button onclick="downloadQR('png')" class="btn-futuristic bg-transparent border border-cyan-400 text-cyan-400 hover:bg-cyan-400 hover:text-black font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 group">
                    <i class="fa-regular fa-image group-hover:scale-110 transition-transform"></i>
                    <span>Baixar PNG <br><small class="text-[10px] font-normal opacity-80">(Transparente)</small></span>
                </button>
                
                <button onclick="downloadQR('jpg')" class="btn-futuristic bg-transparent border border-purple-400 text-purple-400 hover:bg-purple-400 hover:text-black font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 group">
                    <i class="fa-solid fa-image group-hover:scale-110 transition-transform"></i>
                    <span>Baixar JPG <br><small class="text-[10px] font-normal opacity-80">(Cor de Fundo)</small></span>
                </button>
                
                <button onclick="downloadQR('svg')" class="btn-futuristic bg-transparent border border-pink-400 text-pink-400 hover:bg-pink-400 hover:text-black font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 group">
                    <i class="fa-solid fa-vector-square group-hover:scale-110 transition-transform"></i>
                    <span>Baixar SVG <br><small class="text-[10px] font-normal opacity-80">(Vetor Perfeito)</small></span>
                </button>
                
                <button onclick="downloadQR('pdf')" class="btn-futuristic bg-transparent border border-rose-500 text-rose-500 hover:bg-rose-500 hover:text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 group">
                    <i class="fa-solid fa-file-pdf group-hover:scale-110 transition-transform"></i>
                    <span>Baixar PDF <br><small class="text-[10px] font-normal opacity-80">(Documento)</small></span>
                </button>
            </div>
        </section>

    </main>

    <!-- Espaço Publicitário Minimalista (Abaixo do conteúdo) -->
    <div class="w-full max-w-5xl mt-12 mb-6 flex flex-col items-center justify-center relative z-10">
        <div class="flex items-center gap-2 mb-2 opacity-50">
            <i class="fa-solid fa-satellite-dish text-[12px] text-cyan-400 animate-pulse"></i>
        </div>
        <div id="ad-wrapper" class="glass-panel w-full max-w-[320px] md:max-w-[728px] min-h-[90px] rounded-xl flex items-center justify-center overflow-hidden border-slate-700/50">
            <!-- Container do anúncio injetado pelo JS -->
        </div>
    </div>

    <script>
        // --- 1. LÓGICA DO QR CODE E WHATSAPP ---
        
        const qrInput = document.getElementById('qr-text');
        const colorFg = document.getElementById('qr-color-fg');
        const colorBg = document.getElementById('qr-color-bg');
        const canvas = document.getElementById('qr-canvas');
        
        const waMessageContainer = document.getElementById('wa-message-container');
        const waMessageInput = document.getElementById('wa-message');
        let isWhatsApp = false;

        // --- VARIÁVEIS WI-FI ---
        let currentMode = 'text';
        const wifiSsid = document.getElementById('wifi-ssid');
        const wifiPassword = document.getElementById('wifi-password');
        const wifiSecurity = document.getElementById('wifi-security');

        function escapeWifiString(str) {
            return str.replace(/([\\;:,\"])/g, '\\$1');
        }

        // Processa o texto final analisando se é WhatsApp ou Wi-Fi
        function getFinalText() {
            if (currentMode === 'wifi') {
                const ssid = escapeWifiString(wifiSsid.value.trim());
                const pass = escapeWifiString(wifiPassword.value);
                const type = wifiSecurity.value;
                
                // Se não tiver nome, mostra QR vazio pra preview
                if (!ssid) return "WIFI:S:Rede_Wi-Fi;T:WPA;P:;;";
                
                return `WIFI:S:${ssid};T:${type};P:${pass};;`;
            }

            const rawText = qrInput.value.trim();
            let text = rawText || "https://ytalo.com";
            
            if (isWhatsApp) {
                // Limpa o número de telefone (remove espaços, traços, parênteses)
                const cleanPhone = rawText.replace(/[\s\-\(\)\+]/g, '');
                const msg = encodeURIComponent(waMessageInput.value.trim());
                text = `https://wa.me/${cleanPhone}${msg ? '?text=' + msg : ''}`;
            }
            return text;
        }

        // Verifica se o usuário digitou um número de telefone
        function checkInputType() {
            const text = qrInput.value.trim();
            const cleanText = text.replace(/[\s\-\(\)\+]/g, '');
            
            // Regra: Se tem entre 10 e 15 caracteres e SÓ possui números, consideramos telefone
            if (cleanText.length >= 10 && cleanText.length <= 15 && /^\d+$/.test(cleanText)) {
                isWhatsApp = true;
                waMessageContainer.classList.remove('hidden');
            } else {
                isWhatsApp = false;
                waMessageContainer.classList.add('hidden');
            }
            renderPreview();
        }

        // Renderiza a pré-visualização ao vivo
        function renderPreview() {
            // Se o QRCode não carregar por erro da rede, evitamos quebrar o JS
            if (typeof QRCode === 'undefined') return;

            const text = getFinalText();
            const fg = colorFg.value;
            const bg = colorBg.value;

            QRCode.toCanvas(canvas, text, {
                width: 280,
                margin: 2,
                color: { dark: fg, light: bg }
            }, function (error) {
                if (error) console.error("Erro ao gerar preview: ", error);
            });
        }

        // --- SISTEMA DE ABAS (Link vs Wi-Fi) ---
        document.getElementById('tab-text').addEventListener('click', () => {
            currentMode = 'text';
            document.getElementById('tab-text').classList.add('bg-cyan-500/20', 'text-cyan-300');
            document.getElementById('tab-text').classList.remove('text-slate-400');
            document.getElementById('tab-wifi').classList.remove('bg-cyan-500/20', 'text-cyan-300');
            document.getElementById('tab-wifi').classList.add('text-slate-400');
            
            document.getElementById('mode-text-container').classList.remove('hidden');
            document.getElementById('mode-wifi-container').classList.add('hidden');
            renderPreview();
        });

        document.getElementById('tab-wifi').addEventListener('click', () => {
            currentMode = 'wifi';
            document.getElementById('tab-wifi').classList.add('bg-cyan-500/20', 'text-cyan-300');
            document.getElementById('tab-wifi').classList.remove('text-slate-400');
            document.getElementById('tab-text').classList.remove('bg-cyan-500/20', 'text-cyan-300');
            document.getElementById('tab-text').classList.add('text-slate-400');
            
            document.getElementById('mode-wifi-container').classList.remove('hidden');
            document.getElementById('mode-text-container').classList.add('hidden');
            renderPreview();
        });

        // Controle do campo de senha baseado na segurança
        wifiSecurity.addEventListener('change', (e) => {
            if (e.target.value === 'nopass') {
                wifiPassword.disabled = true;
                wifiPassword.classList.add('opacity-50', 'cursor-not-allowed');
                wifiPassword.value = ''; // Limpa a senha
            } else {
                wifiPassword.disabled = false;
                wifiPassword.classList.remove('opacity-50', 'cursor-not-allowed');
            }
            renderPreview();
        });

        // Escutadores de Eventos
        qrInput.addEventListener('input', checkInputType);
        waMessageInput.addEventListener('input', renderPreview);
        wifiSsid.addEventListener('input', renderPreview);
        wifiPassword.addEventListener('input', renderPreview);
        colorFg.addEventListener('input', renderPreview);
        colorBg.addEventListener('input', renderPreview);

        // Inicializa o preview na abertura
        setTimeout(renderPreview, 500); 

        // --- 2. LÓGICA DE DOWNLOADS (CORRIGIDA) ---
        function downloadQR(type) {
            if (typeof QRCode === 'undefined') {
                alert("A biblioteca geradora ainda está carregando, aguarde 1 segundo!");
                return;
            }

            const text = getFinalText();
            const fg = colorFg.value;
            const bg = colorBg.value;

            if (type === 'png') {
                // PNG Transparente
                QRCode.toDataURL(text, { type: 'image/png', width: 1024, margin: 2, color: { dark: fg, light: '#00000000' } }, function (err, url) {
                    if (err) return console.error(err);
                    triggerDownload(url, 'qrcoder_ytalo.png');
                });
            } 
            else if (type === 'jpg') {
                // JPG (Desenhamos em um canvas temporário pra garantir que o fundo customizado apareça, sem transparência)
                const tempCanvas = document.createElement('canvas');
                QRCode.toCanvas(tempCanvas, text, { width: 1024, margin: 2, color: { dark: fg, light: bg } }, function (err) {
                    if (err) return console.error(err);
                    const url = tempCanvas.toDataURL('image/jpeg', 1.0);
                    triggerDownload(url, 'qrcoder_ytalo.jpg');
                });
            }
            else if (type === 'svg') {
                // SVG Vetorizável
                QRCode.toString(text, { type: 'svg', width: 1024, margin: 2, color: { dark: fg, light: bg } }, function (err, string) {
                    if (err) return console.error(err);
                    const blob = new Blob([string], { type: 'image/svg+xml;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    triggerDownload(url, 'qrcoder_ytalo.svg');
                });
            }
            else if (type === 'pdf') {
                // PDF Documento
                const tempCanvas = document.createElement('canvas');
                QRCode.toCanvas(tempCanvas, text, { width: 1024, margin: 2, color: { dark: fg, light: bg } }, function (err) {
                    if (err) return console.error(err);
                    const url = tempCanvas.toDataURL('image/png');
                    
                    if(typeof window.jspdf === 'undefined') {
                        alert("Biblioteca PDF carregando, tente novamente!");
                        return;
                    }

                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                    
                    doc.setFontSize(22);
                    doc.text("QRcoder do Ytalo", 105, 20, { align: "center" });
                    doc.setFontSize(10);
                    // Mostra o link gerado (resumido se for muito longo)
                    let textExibicao = text.substring(0, 70) + (text.length > 70 ? '...' : '');
                    doc.text(textExibicao, 105, 30, { align: "center" });
                    
                    // Adiciona a imagem QR
                    doc.addImage(url, 'PNG', 45, 40, 120, 120);
                    doc.save('qrcoder_ytalo.pdf');
                });
            }
        }

        function triggerDownload(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // --- 3. LÓGICA DO ESPAÇO PUBLICITÁRIO (Minimalista e Refresh) ---
        
        function loadAd() {
            const adWrapper = document.getElementById('ad-wrapper');
            adWrapper.innerHTML = ''; // Limpa o anúncio anterior
            
            // Recria a div alvo exigida pelo seu script
            const adContainer = document.createElement('div');
            adContainer.id = 'container-ae6aa2a13aff747c67b357b6561d5ede';
            adWrapper.appendChild(adContainer);

            // Remove o script antigo do body (para não acumular a cada 4 min)
            const oldScript = document.getElementById('ad-script-invoke');
            if (oldScript) {
                oldScript.remove();
            }

            // Injeta o novo script diretamente na página
            const script = document.createElement('script');
            script.id = 'ad-script-invoke';
            script.async = true;
            script.dataset.cfasync = 'false';
            script.src = 'https://pl29129303.profitablecpmratenetwork.com/ae6aa2a13aff747c67b357b6561d5ede/invoke.js';
            document.body.appendChild(script);
        }

        // Carrega o anúncio na primeira vez
        loadAd();

        // Configura o Refresh Automático a cada 4 Minutos (240.000 ms)
        setInterval(loadAd, 240000);

    </script>
</body>
</html>
